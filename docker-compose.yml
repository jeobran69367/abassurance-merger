version: "3.8"

# Cluster Kafka local optionnel : à lancer avec `docker-compose up -d` pour tester la
# pipeline avec un vrai broker plutôt que la simulation locale (voir docs/architecture.md).
# Puis exporter KAFKA_BOOTSTRAP_SERVERS=localhost:9092 avant de lancer les scripts.
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
